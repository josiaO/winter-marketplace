      description: Override list to ensure request context is passed for media URLs.
      parameters:
      - in: query
        name: category
        schema:
          type: integer
      - in: query
        name: city__icontains
        schema:
          type: string
      - in: query
        name: condition
        schema:
          type: string
          enum:
          - new
          - not_applicable
          - refurbished
          - used
        description: |-
          * `new` - New
          * `used` - Used
          * `refurbished` - Refurbished
          * `not_applicable` - N/A
      - in: query
        name: exclude_vertical
        schema:
          type: string
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: listing_type
        schema:
          type: string
          enum:
          - rent
          - sale
          - service
        description: |-
          * `sale` - For Sale
          * `rent` - For Rent
          * `service` - Service
      - in: query
        name: max_price
        schema:
          type: number
      - in: query
        name: min_price
        schema:
          type: number
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - active
          - archived
          - draft
          - flagged
          - rented
          - sold
          - suspended
        description: |-
          * `draft` - Draft
          * `active` - Active
          * `flagged` - Flagged
          * `sold` - Sold
          * `rented` - Rented
          * `suspended` - Suspended
          * `archived` - Archived
      tags:
      - api
      security:
      - firebaseAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedListingList'
          description: ''
    post:
      operationId: api_v1_listings_create
      description: Thinner create method delegating media handling to service.
      tags:
