  /api/admin/sellers/verification-queue/:
    get:
      operationId: api_admin_sellers_verification_queue_list
      description: |-
        Pending identity (under_review) and/or pending business verification rows.
        Query: queue=all|identity|business (default all), plus search & filters.
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      - in: query
        name: is_business_verified
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: verification_status
        schema:
          type: string
          enum:
          - incomplete
          - pending_id
          - rejected
          - suspended
          - under_review
          - verified
        description: |-
          * `incomplete` - Incomplete
          * `pending_id` - Pending ID
          * `under_review` - Under review
          * `verified` - Verified
          * `rejected` - Rejected
          * `suspended` - Suspended
      tags:
      - api
      security:
      - firebaseAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Paginated_AdminQueueListSchemaList'
          description: ''
