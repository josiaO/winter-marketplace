components:
  schemas:
    AnomalyTypeEnum:
      enum:
      - too_low
      - too_high
      - price_drop
      - price_spike
      - category_mismatch
      type: string
      description: |-
        * `too_low` - Suspiciously Low Price
        * `too_high` - Suspiciously High Price
        * `price_drop` - Sudden Price Drop
        * `price_spike` - Sudden Price Spike
        * `category_mismatch` - Price Mismatch with Category
    Attribute:
      type: object
      description: Serializer for Attribute with nested options.
      properties:
        id:
          type: integer
          readOnly: true
        category:
          type: integer
        name:
          type: string
          maxLength: 255
        key:
          type: string
          description: Internal key for attribute
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        field_type:
          $ref: '#/components/schemas/AttributeFieldTypeEnum'
        is_required:
          type: boolean
        order:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        options:
          type: array
          items:
            $ref: '#/components/schemas/AttributeOption'
          readOnly: true
      required:
      - category
      - field_type
      - id
      - key
      - name
      - options
    AttributeFieldTypeEnum:
      enum:
      - text
      - number
      - boolean
      - select
      type: string
      description: |-
        * `text` - Text
        * `number` - Number
        * `boolean` - Boolean
        * `select` - Select
    AttributeOption:
      type: object
      description: Serializer for AttributeOption.
      properties:
        id:
          type: integer
          readOnly: true
        value:
          type: string
          maxLength: 255
        order:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
      required:
      - id
      - value
    BlankEnum:
      enum:
      - ''
    BusinessLicenseStatusEnum:
      enum:
      - not_submitted
      - pending
      - verified
      - rejected
      type: string
      description: |-
        * `not_submitted` - Not Submitted
        * `pending` - Pending Review
        * `verified` - Verified
        * `rejected` - Rejected
    BusinessTypeEnum:
      enum:
      - individual
      - business
      - retailer
      - wholesaler
      type: string
      description: |-
        * `individual` - Individual Seller
        * `business` - Business
        * `retailer` - Retailer
        * `wholesaler` - Wholesaler
    Cart:
      type: object
      description: Serializer for shopping cart.
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
          readOnly: true
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        item_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - item_count
      - items
      - total
      - updated_at
      - user
    CartItem:
      type: object
      description: Serializer for cart items.
      properties:
        id:
          type: integer
          readOnly: true
        listing:
          allOf:
          - $ref: '#/components/schemas/Listing'
          readOnly: true
        listing_id:
          type: integer
          writeOnly: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 1
          format: int64
        price_at_time:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
          description: Price snapshot when added to cart
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - listing
      - listing_id
      - price_at_time
      - subtotal
      - updated_at
    Category:
      type: object
      description: Serializer for Category with nested fields and children.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
        icon:
          type: string
          description: Icon name (e.g. FontAwesome or Material Icon)
          maxLength: 50
        parent:
          type: integer
          nullable: true
        parent_name:
          type: string
          readOnly: true
        vertical:
          $ref: '#/components/schemas/VerticalEnum'
        is_active:
          type: boolean
        is_service:
          type: boolean
          description: Is this a service category?
        is_physical:
          type: boolean
          description: Is this a physical product category?
        order:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        fields:
          type: array
          items:
            $ref: '#/components/schemas/CategoryField'
          readOnly: true
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/Attribute'
          readOnly: true
        children:
          type: array
          items:
            type: object
            additionalProperties: {}
          readOnly: true
        listing_count:
          type: integer
          readOnly: true
        is_leaf:
          type: string
          readOnly: true
      required:
      - attributes
      - children
      - fields
      - id
      - is_leaf
      - listing_count
      - name
      - parent_name
      - slug
    CategoryField:
      type: object
      description: Serializer for CategoryField - defines dynamic specs for listings.
      properties:
        id:
          type: integer
          readOnly: true
        category:
          type: integer
        field_name:
          type: string
        field_label:
          type: string
        field_type:
          $ref: '#/components/schemas/CategoryFieldFieldTypeEnum'
        required:
          type: boolean
        choices:
          nullable: true
        unit:
          type: string
          description: e.g. GB, square meters, Liters
          maxLength: 20
        order:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
      required:
      - category
      - id
    CategoryFieldFieldTypeEnum:
      enum:
      - text
      - long_text
      - integer
      - decimal
      - number
      - select
      - boolean
      - date
      type: string
      description: |-
        * `text` - Text
        * `long_text` - Long Text
        * `integer` - Integer
        * `decimal` - Decimal
        * `number` - Number (Legacy)
        * `select` - Select
        * `boolean` - Boolean
        * `date` - Date
    CategoryList:
      type: object
      description: Lightweight serializer for category lists and subcategory display.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
        vertical:
          $ref: '#/components/schemas/VerticalEnum'
        icon:
          type: string
          description: Icon name (e.g. FontAwesome or Material Icon)
          maxLength: 50
        is_active:
          type: boolean
        is_service:
          type: boolean
          description: Is this a service category?
        is_physical:
          type: boolean
          description: Is this a physical product category?
        parent:
          type: integer
          nullable: true
        parent_name:
          type: string
          readOnly: true
        is_leaf:
          type: string
          readOnly: true
        fields_count:
          type: integer
          readOnly: true
        order:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
      required:
      - fields_count
      - id
      - is_leaf
      - name
      - parent_name
      - slug
    ChangePasswordRequest:
      type: object
      properties:
        old_password:
          type: string
        new_password:
          type: string
        confirm_password:
          type: string
      required:
      - confirm_password
      - new_password
      - old_password
    ConditionEnum:
      enum:
