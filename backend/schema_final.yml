          type: string
          description: mpesa, selcom, stripe, bank_transfer, etc.
          maxLength: 50
        gateway_reference:
          type: string
          description: Transaction ID returned by the payment gateway.
          maxLength: 255
        description:
          type: string
          maxLength: 500
