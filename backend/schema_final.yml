        order_id:
          type: integer
          readOnly: true
        listing:
          type: integer
          nullable: true
          description: Listing context
        listing_id:
          type: integer
          readOnly: true
        listing_title:
          type: string
          readOnly: true
        listing_image:
          type: string
          format: uri
          nullable: true
          readOnly: true
        listing_summary:
          type: object
