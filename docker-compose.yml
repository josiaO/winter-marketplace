version: '3.8'
services:
  # Admin UI: http://localhost:8000/admin/ (not under /api/v1; open this URL directly).
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - DEBUG=1
      - SECRET_KEY=dev-secret
      - EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
      - FRONTEND_URL=http://localhost:3000
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - redis
  redis:
    image: redis:alpine
    ports:
      - '6379:6379'
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend worker -l info
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=1
      - SECRET_KEY=dev-secret
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - redis
      - backend
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend beat -l info
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=1
      - SECRET_KEY=dev-secret
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - redis
      - backend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
    environment:
      # Next.js route handler proxies /api/v1 → Django (server-side).
      - INTERNAL_API_URL=http://backend:8000
      # Browser-absolute URLs (e.g. media); host reaches Django on published port.
      - NEXT_PUBLIC_API_URL=http://localhost:8000
